name: Update Stock Data

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at 00:00 UTC every Monday
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run GetStockData script
        run: |
          python scripts/GetStockData.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/Data.json public/FastData.json public/tickers.json
          
          # Only commit if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "Automated data update [skip ci]"
            git push
          fi
